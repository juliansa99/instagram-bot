<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram Bot Capilar</title>
<style>
  :root {
    --bg: #0f0f0f;
    --bg2: #1a1a1a;
    --bg3: #242424;
    --border: #2e2e2e;
    --text: #e8e8e8;
    --muted: #888;
    --accent: #9b6dff;
    --accent2: #7c4dff;
    --green: #2ecc71;
    --red: #e74c3c;
    --amber: #f39c12;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }

  header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
  header h1 { font-size: 18px; font-weight: 600; }
  header h1 span { color: var(--accent); }
  #next-publish-banner { font-size: 13px; color: var(--muted); background: var(--bg3); padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); }

  .main { max-width: 960px; margin: 0 auto; padding: 28px 20px; }

  /* UPLOAD AREA */
  .upload-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 28px; }
  .upload-card h2 { font-size: 15px; font-weight: 500; margin-bottom: 16px; color: var(--muted); letter-spacing: .5px; text-transform: uppercase; font-size: 12px; }
  .drop-zone { border: 2px dashed var(--border); border-radius: 10px; padding: 36px 20px; text-align: center; cursor: pointer; transition: all .2s; }
  .drop-zone:hover, .drop-zone.over { border-color: var(--accent); background: rgba(155,109,255,.06); }
  .drop-zone svg { width: 36px; height: 36px; stroke: var(--muted); margin-bottom: 12px; }
  .drop-zone p { color: var(--muted); font-size: 14px; }
  .drop-zone span { color: var(--accent); text-decoration: underline; cursor: pointer; }
  #file-input { display: none; }

  .upload-progress { margin-top: 16px; display: none; }
  .upload-progress h3 { font-size: 13px; color: var(--muted); margin-bottom: 10px; }
  .progress-bar-wrap { background: var(--bg3); border-radius: 99px; height: 6px; overflow: hidden; margin-bottom: 8px; }
  .progress-bar { height: 100%; background: var(--accent); border-radius: 99px; transition: width .3s; width: 0%; }
  .progress-text { font-size: 12px; color: var(--muted); }

  /* COLA */
  .queue-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
  .queue-header h2 { font-size: 12px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
  .queue-header-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .queue-stats { display: flex; gap: 12px; }
  .stat { font-size: 12px; padding: 4px 10px; border-radius: 99px; border: 1px solid var(--border); color: var(--muted); }
  .stat b { font-weight: 600; }
  .stat.pending b { color: var(--accent); }
  .stat.published b { color: var(--green); }
  .stat.error b { color: var(--red); }

  .queue-empty { text-align: center; padding: 48px 20px; color: var(--muted); font-size: 14px; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); }

  .post-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); display: grid; grid-template-columns: 100px 1fr auto; gap: 0; overflow: hidden; margin-bottom: 12px; transition: border-color .2s; }
  .post-card:hover { border-color: #3e3e3e; }
  .post-card .thumb { width: 100px; height: 100px; object-fit: cover; display: block; }
  .post-card .thumb-placeholder { width: 100px; height: 100px; background: var(--bg3); display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 12px; }
  .post-body { padding: 14px 16px; display: flex; flex-direction: column; gap: 8px; min-width: 0; }
  .post-meta { display: flex; align-items: center; gap: 8px; }
  .post-num { font-size: 12px; color: var(--muted); }
  .badge { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 99px; }
  .badge.pending { background: rgba(155,109,255,.15); color: var(--accent); }
  .badge.published { background: rgba(46,204,113,.12); color: var(--green); }
  .badge.error { background: rgba(231,76,60,.12); color: var(--red); }
  .badge.processing { background: rgba(243,156,18,.12); color: var(--amber); }
  .post-caption { font-size: 13px; color: var(--text); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .post-caption-edit { font-size: 13px; font-family: inherit; background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 8px; width: 100%; resize: vertical; min-height: 80px; line-height: 1.5; display: none; }
  .post-date { font-size: 11px; color: var(--muted); }
  .post-actions { padding: 14px 12px; display: flex; flex-direction: column; gap: 6px; align-items: flex-end; justify-content: center; }
  button { cursor: pointer; font-family: inherit; border: none; }
  .btn { padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 500; transition: all .15s; }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-ghost:hover { background: var(--bg3); color: var(--text); }
  .btn-accent { background: var(--accent2); color: #fff; }
  .btn-accent:hover { background: var(--accent); }
  .btn-red { background: rgba(231,76,60,.1); color: var(--red); border: 1px solid rgba(231,76,60,.2); }
  .btn-red:hover { background: rgba(231,76,60,.2); }
  .btn-green { background: rgba(46,204,113,.1); color: var(--green); border: 1px solid rgba(46,204,113,.2); }
  .btn-green:hover { background: rgba(46,204,113,.2); }

  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 18px; font-size: 13px; color: var(--text); z-index: 1000; transform: translateY(80px); opacity: 0; transition: all .3s; max-width: 320px; }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.ok { border-color: var(--green); }
  .toast.err { border-color: var(--red); }

  @media (max-width: 600px) {
    .post-card { grid-template-columns: 80px 1fr; }
    .post-card .thumb, .post-card .thumb-placeholder { width: 80px; height: 80px; }
  }
</style>
</head>
<body>

<header>
  <h1>📸 Bot <span>Capilar</span></h1>
  <div id="next-publish-banner">Cargando próxima publicación...</div>
</header>

<div class="main">

  <!-- UPLOAD -->
  <div class="upload-card">
    <h2>Subir fotos nuevas</h2>
    <div class="drop-zone" id="drop-zone">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      <p>Arrastrá todas las fotos acá, o <span onclick="document.getElementById('file-input').click()">buscalas en tu computadora</span></p>
      <p style="font-size:12px;margin-top:6px">JPG o PNG · podés subir varias a la vez</p>
    </div>
    <input type="file" id="file-input" accept="image/jpeg,image/png,image/webp" multiple>

    <div class="upload-progress" id="upload-progress">
      <h3 id="progress-label">Procesando imágenes con IA...</h3>
      <div class="progress-bar-wrap"><div class="progress-bar" id="progress-bar"></div></div>
      <div class="progress-text" id="progress-text">0 de 0</div>
    </div>
  </div>

  <!-- COLA -->
  <div class="queue-header">
    <h2>Cola de publicaciones</h2>
    <div class="queue-header-right">
      <div class="queue-stats">
        <div class="stat pending">Pendientes: <b id="stat-pending">0</b></div>
        <div class="stat published">Publicados: <b id="stat-published">0</b></div>
        <div class="stat error">Errores: <b id="stat-error">0</b></div>
      </div>
      <button class="btn btn-red" id="btn-delete-all" onclick="deleteAll()" style="display:none">🗑 Eliminar todo</button>
    </div>
  </div>
  <div id="queue-list"></div>

</div>

<div class="toast" id="toast"></div>

<script>
let editingId = null;

// ─── DRAG & DROP ──────────────────────────────────────────────────────────────
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('over'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('over'); handleFiles(e.dataTransfer.files); });
fileInput.addEventListener('change', () => handleFiles(fileInput.files));

// ─── PROCESAR ARCHIVOS ────────────────────────────────────────────────────────
async function handleFiles(files) {
  const arr = Array.from(files).filter(f => f.type.startsWith('image/'));
  if (!arr.length) return;

  const progressEl  = document.getElementById('upload-progress');
  const barEl       = document.getElementById('progress-bar');
  const textEl      = document.getElementById('progress-text');
  const labelEl     = document.getElementById('progress-label');

  progressEl.style.display = 'block';
  let done = 0;

  for (const file of arr) {
    labelEl.textContent = `Procesando "${file.name}" con IA...`;
    textEl.textContent  = `${done} de ${arr.length}`;
    barEl.style.width   = (done / arr.length * 100) + '%';

    try {
      const b64 = await fileToBase64(file);
      const res = await fetch('/api/upload', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ image: b64, media_type: file.type })
      });
      const data = await res.json();
      if (!data.ok) throw new Error(data.error);
    } catch(e) {
      showToast('Error con ' + file.name + ': ' + e.message, 'err');
    }

    done++;
    barEl.style.width = (done / arr.length * 100) + '%';
    textEl.textContent = `${done} de ${arr.length}`;
    await loadQueue();
  }

  labelEl.textContent = '¡Listo! Todas las fotos están en la cola.';
  setTimeout(() => { progressEl.style.display = 'none'; }, 3000);
  fileInput.value = '';
}

function fileToBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = e => res(e.target.result.split(',')[1]);
    r.onerror = () => rej(new Error('Error leyendo archivo'));
    r.readAsDataURL(file);
  });
}

// ─── COLA ─────────────────────────────────────────────────────────────────────
async function loadQueue() {
  const res   = await fetch('/api/queue');
  const posts = await res.json();

  let pending = 0, published = 0, errors = 0;
  posts.forEach(p => {
    if (p.status === 'pending')   pending++;
    if (p.status === 'published') published++;
    if (p.status === 'error')     errors++;
  });
  document.getElementById('stat-pending').textContent   = pending;
  document.getElementById('stat-published').textContent = published;
  document.getElementById('stat-error').textContent     = errors;

  // Mostrar/ocultar botón eliminar todo
  const btnDeleteAll = document.getElementById('btn-delete-all');
  const deletable = posts.filter(p => p.status !== 'published');
  btnDeleteAll.style.display = deletable.length ? 'inline-block' : 'none';

  const list = document.getElementById('queue-list');
  if (!posts.length) {
    list.innerHTML = '<div class="queue-empty">Todavía no hay fotos en la cola.<br>Subí tus fotos arriba para empezar.</div>';
    return;
  }

  list.innerHTML = posts.map((p, i) => `
    <div class="post-card" id="card-${p.id}">
      <img class="thumb" src="${p.image_url}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" alt="">
      <div class="thumb-placeholder" style="display:none">Sin imagen</div>
      <div class="post-body">
        <div class="post-meta">
          <span class="post-num">#${i + 1}</span>
          <span class="badge ${p.status}">${statusLabel(p.status)}</span>
        </div>
        <div class="post-caption" id="caption-text-${p.id}">${escHtml(p.caption)}</div>
        <textarea class="post-caption-edit" id="caption-edit-${p.id}">${escHtml(p.caption)}</textarea>
        <div class="post-date">${p.published_at ? 'Publicado: ' + formatDate(p.published_at) : 'Agregado: ' + formatDate(p.created_at)}</div>
      </div>
      <div class="post-actions">
        ${p.status === 'pending' ? `
          <button class="btn btn-ghost" onclick="toggleEdit(${p.id})" id="edit-btn-${p.id}">Editar</button>
          <button class="btn btn-green" onclick="publishNow(${p.id})">Publicar ya</button>
          <button class="btn btn-red" onclick="deletePost(${p.id})">Eliminar</button>
        ` : ''}
        ${p.status === 'error' ? `
          <button class="btn btn-accent" onclick="retryPost(${p.id})">Reintentar</button>
          <button class="btn btn-red" onclick="deletePost(${p.id})">Eliminar</button>
        ` : ''}
      </div>
    </div>
  `).join('');
}

function statusLabel(s) {
  return { pending: 'En cola', published: 'Publicado', error: 'Error', processing: 'Procesando...' }[s] || s;
}

function escHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function formatDate(d) {
  return new Date(d + 'Z').toLocaleString('es-AR', { dateStyle: 'short', timeStyle: 'short' });
}

// ─── ACCIONES ─────────────────────────────────────────────────────────────────
function toggleEdit(id) {
  const textEl = document.getElementById('caption-text-' + id);
  const editEl = document.getElementById('caption-edit-' + id);
  const btnEl  = document.getElementById('edit-btn-' + id);

  if (editEl.style.display === 'block') {
    // Guardar
    const newCaption = editEl.value;
    fetch('/api/post/' + id, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ caption: newCaption })
    }).then(() => {
      textEl.textContent = newCaption;
      editEl.style.display = 'none';
      textEl.style.display = '-webkit-box';
      btnEl.textContent = 'Editar';
      showToast('Caption guardado ✓', 'ok');
    });
  } else {
    // Abrir editor
    textEl.style.display = 'none';
    editEl.style.display = 'block';
    editEl.focus();
    btnEl.textContent = 'Guardar';
  }
}

async function deletePost(id) {
  if (!confirm('¿Eliminar este post de la cola?')) return;
  await fetch('/api/post/' + id, { method: 'DELETE' });
  showToast('Post eliminado', 'ok');
  loadQueue();
}

async function publishNow(id) {
  if (!confirm('¿Publicar este post ahora en Instagram?')) return;
  const card = document.getElementById('card-' + id);
  card.querySelector('.badge').className = 'badge processing';
  card.querySelector('.badge').textContent = 'Publicando...';

  const res  = await fetch('/api/publish-now/' + id, { method: 'POST' });
  const data = await res.json();

  if (data.ok) {
    showToast('¡Publicado en Instagram! ✓', 'ok');
  } else {
    showToast('Error: ' + data.error, 'err');
  }
  loadQueue();
}

async function retryPost(id) {
  await fetch('/api/post/' + id, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ status: 'pending' })
  });
  loadQueue();
}

// ─── ELIMINAR TODO ────────────────────────────────────────────────────────────
async function deleteAll() {
  if (!confirm('¿Eliminar TODOS los posts de la cola? Esta acción no se puede deshacer.')) return;

  const res   = await fetch('/api/queue');
  const posts = await res.json();
  const deletable = posts.filter(p => p.status !== 'published');

  if (!deletable.length) {
    showToast('No hay posts para eliminar', 'err');
    return;
  }

  for (const p of deletable) {
    await fetch('/api/post/' + p.id, { method: 'DELETE' });
  }

  showToast(`${deletable.length} posts eliminados ✓`, 'ok');
  loadQueue();
}

// ─── PRÓXIMA PUBLICACIÓN ──────────────────────────────────────────────────────
async function updateNextPublish() {
  try {
    const res  = await fetch('/api/next-publish');
    const data = await res.json();
    const banner = document.getElementById('next-publish-banner');
    if (data.next) {
      const diff = Math.max(0, new Date(data.next) - new Date());
      const h = Math.floor(diff / 3600000);
      const m = Math.floor((diff % 3600000) / 60000);
      banner.textContent = `Próxima publicación en ${h}h ${m}m`;
    } else {
      banner.textContent = 'Cola vacía';
    }
  } catch(e) {}
}

// ─── TOAST ────────────────────────────────────────────────────────────────────
function showToast(msg, type = 'ok') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className   = 'toast ' + type + ' show';
  setTimeout(() => t.className = 'toast ' + type, 3000);
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
loadQueue();
updateNextPublish();
setInterval(loadQueue, 15000);
setInterval(updateNextPublish, 60000);
</script>
</body>
</html>
